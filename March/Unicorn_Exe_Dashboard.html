<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Operations Portal | March 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a2a6c; --accent: #b21f1f; --success: #27ae60; --light: #f4f7f6; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--light); margin: 0; padding: 30px; color: #333; }
        
        /* Header & Controls */
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .controls select { padding: 12px 20px; font-size: 1rem; border-radius: 8px; border: 2px solid var(--primary); cursor: pointer; outline: none; }

        /* KPI Cards */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; transition: transform 0.3s; }
        .kpi-card:hover { transform: translateY(-5px); }
        .kpi-card h3 { color: #7f8c8d; font-size: 0.85rem; text-transform: uppercase; margin: 0 0 10px 0; letter-spacing: 1px; }
        .kpi-card .value { font-size: 2.5rem; font-weight: 800; color: var(--primary); }

        /* Charts */
        .main-chart-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header-flex">
        <div>
            <h1>Operations Command Center</h1>
            <p>Strategic Performance Insights - March 2026</p>
        </div>
        <div class="controls">
            <label><strong>Select View:</strong></label>
            <select id="teamSelector" onchange="updateDashboard()">
                <option value="all">Company Overview (All Teams)</option>
                <option value="west">West Team</option>
                <option value="south1">South 1 Team</option>
                <option value="south2">South 2 Team</option>
            </select>
        </div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><h3>Total Tasks Handled</h3><div class="value" id="kpi-tasks">296</div></div>
        <div class="kpi-card"><h3>Avg. Resolution Rate</h3><div class="value" id="kpi-res" style="color: var(--success)">70.9%</div></div>
        <div class="kpi-card"><h3>Avg. Task Duration</h3><div class="value" id="kpi-dur">43.4 min</div></div>
    </div>

    <div class="main-chart-container">
        <h2 id="chartTitle">Company Performance Trends</h2>
        <canvas id="mainChart" height="100"></canvas>
    </div>

    <script>
        // DATA ANALYSIS RESULTS
        const teamData = {
            all: {
                tasks: 296, res: '70.9%', dur: '43.4', title: 'Company Performance Trends',
                labels: ['Week 10', 'Week 11', 'Week 12', 'Week 13', 'Week 14'],
                volume: [43, 46, 104, 70, 22],
                resolution: [78.3, 74.5, 67.9, 63.4, 84.6]
            },
            west: {
                tasks: 86, res: '65.1%', dur: '29.0', title: 'West Team Analysis',
                labels: ['Week 10', 'Week 11', 'Week 12', 'Week 13', 'Week 14'],
                volume: [18, 12, 25, 23, 3],
                resolution: [73.7, 83.3, 48.0, 69.6, 57.1]
            },
            south1: {
                tasks: 112, res: '67.0%', dur: '33.3', title: 'South 1 Team Analysis',
                labels: ['Week 10', 'Week 11', 'Week 12', 'Week 13', 'Week 14'],
                volume: [11, 18, 46, 27, 10],
                resolution: [72.7, 61.1, 67.4, 59.3, 90.0]
            },
            south2: {
                tasks: 98, res: '80.6%', dur: '67.7', title: 'South 2 Team Analysis',
                labels: ['Week 10', 'Week 11', 'Week 12', 'Week 13', 'Week 14'],
                volume: [14, 16, 33, 20, 9],
                resolution: [87.5, 82.4, 82.9, 61.9, 100.0]
            }
        };

        let myChart;
        const ctx = document.getElementById('mainChart').getContext('2d');

        function initChart() {
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: teamData.all.labels,
                    datasets: [{
                        label: 'Task Volume',
                        data: teamData.all.volume,
                        backgroundColor: 'rgba(26, 42, 108, 0.4)',
                        yAxisID: 'y'
                    }, {
                        label: 'Resolution Rate %',
                        data: teamData.all.resolution,
                        type: 'line',
                        borderColor: '#b21f1f',
                        borderWidth: 4,
                        tension: 0.4,
                        yAxisID: 'y1'
                    }]
                },
                options: {
                    scales: {
                        y: { type: 'linear', position: 'left', title: { display: true, text: 'Volume' } },
                        y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Success %' } }
                    }
                }
            });
        }

        function updateDashboard() {
            const selection = document.getElementById('teamSelector').value;
            const data = teamData[selection];

            // Update KPI Text
            document.getElementById('kpi-tasks').innerText = data.tasks;
            document.getElementById('kpi-res').innerText = data.res;
            document.getElementById('kpi-dur').innerText = data.dur + ' min';
            document.getElementById('chartTitle').innerText = data.title;

            // Update Chart Data
            myChart.data.datasets[0].data = data.volume;
            myChart.data.datasets[1].data = data.resolution;
            myChart.update();
        }

        initChart();
    </script>
</body>
</html>
