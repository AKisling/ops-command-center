<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Crew Performance - March 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .header { text-align: center; margin-bottom: 40px; }
        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); }
        .card h3 { margin: 0; font-size: 0.9rem; color: #7f8c8d; text-transform: uppercase; }
        .card .value { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .chart-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 20px; }
        @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Operational Excellence Dashboard</h1>
        <p>Monthly Performance Review: West, South 1, & South 2 Teams</p>
    </div>

    <div class="kpi-container">
        <div class="card"><h3>Total Tasks Processed</h3><div class="value">285</div></div>
        <div class="card" style="border-top-color: var(--success);"><h3>Overall Resolution Rate</h3><div class="value">71%</div></div>
        <div class="card"><h3>Avg. Task Duration</h3><div class="value">64 min</div></div>
        <div class="card"><h3>Top Performer (Quality)</h3><div class="value">South 2</div></div>
    </div>

    <div class="chart-grid">
        <div class="chart-container">
            <h2>Team Efficiency Comparison</h2>
            <canvas id="comparisonChart"></canvas>
        </div>

        <div class="chart-container">
            <h2>South 1: Resilience Analysis</h2>
            <canvas id="growthChart"></canvas>
        </div>
    </div>

    <script>
        // CHART 1: TEAM COMPARISON (Volume vs Duration)
        new Chart(document.getElementById('comparisonChart'), {
            type: 'bar',
            data: {
                labels: ['West', 'South 1', 'South 2'],
                datasets: [
                    { label: 'Total Tasks', data: [81, 112, 92], backgroundColor: '#3498db' },
                    { label: 'Avg Duration (Min)', data: [45, 52, 96], backgroundColor: '#e67e22' }
                ]
            },
            options: { responsive: true, plugins: { legend: { position: 'top' } } }
        });

        // CHART 2: SOUTH 1 GROWTH (Volume vs Resolution %)
        new Chart(document.getElementById('growthChart'), {
            type: 'line',
            data: {
                labels: ['Week 10', 'Week 11', 'Week 12 (Surge)', 'Week 13', 'Week 14'],
                datasets: [{
                    label: 'Resolution Rate %',
                    data: [73, 61, 67, 59, 90],
                    borderColor: '#27ae60',
                    tension: 0.3,
                    yAxisID: 'y1'
                }, {
                    label: 'Task Volume',
                    data: [11, 18, 46, 27, 10],
                    type: 'bar',
                    backgroundColor: 'rgba(52, 152, 219, 0.2)',
                    yAxisID: 'y'
                }]
            },
            options: {
                scales: {
                    y: { type: 'linear', position: 'left', title: { display: true, text: 'Tasks' } },
                    y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Resolution %' } }
                }
            }
        });
    </script>
</body>
</html>
